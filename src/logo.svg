<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="HU Book Extractor">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b4f9e"/>
      <stop offset="100%" style="stop-color:#3d2a5c"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8dff7"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#cover)"/>
  <!-- Open book -->
  <path d="M64 28 L64 96" stroke="#c4a8e8" stroke-width="3" stroke-linecap="round"/>
  <path d="M64 32 C48 28 32 34 28 48 L28 92 C32 86 48 82 64 86 L64 32 Z" fill="url(#page)" stroke="#9b7bc9" stroke-width="1.5"/>
  <path d="M64 32 C80 28 96 34 100 48 L100 92 C96 86 80 82 64 86 L64 32 Z" fill="url(#page)" stroke="#9b7bc9" stroke-width="1.5"/>
  <!-- Text lines on pages -->
  <line x1="36" y1="52" x2="54" y2="52" stroke="#7c5fb8" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="62" x2="52" y2="62" stroke="#a890d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="74" y1="52" x2="92" y2="52" stroke="#7c5fb8" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="62" x2="94" y2="62" stroke="#a890d4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- HU monogram -->
  <text x="64" y="100" text-anchor="middle" font-family="Georgia, &apos;Times New Roman&apos;, serif" font-size="17" font-weight="700" fill="#f0e8ff" letter-spacing="2">HU</text>
  <text x="64" y="118" text-anchor="middle" font-family="system-ui, &apos;Segoe UI&apos;, sans-serif" font-size="8" font-weight="600" fill="#d8c8f0" letter-spacing="1.5">Extractor</text>
</svg>
